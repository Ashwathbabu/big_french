<!DOCTYPE html>
<html lang="en">
<head>
    <title>Forgot Password - BigFrench</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #fff5e6; }
        .box { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { background: #f25c05; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Forgot Password?</h2>
        <p>Enter your email to receive a reset link.</p>
        <input type="email" id="email" placeholder="Email Address" required />
        <br>
        <button onclick="sendResetLink()">Send Reset Link</button>
        <p id="msg" style="color: green; margin-top: 10px;"></p>
    </div>

    <script>
        async function sendResetLink() {
            const email = document.getElementById('email').value;
            const msgEl = document.getElementById('msg');
            
            if(!email) return alert("Please enter your email");
            
            msgEl.innerText = "Sending reset link...";
            msgEl.style.color = "blue";

            try {
                const res = await fetch('/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const data = await res.json();
                
                if (res.ok) {
                    msgEl.innerText = data.message;
                    msgEl.style.color = "green";
                    alert("Email sent! Check your inbox.");
                } else {
                    msgEl.innerText = data.message || "Error occurred";
                    msgEl.style.color = "red";
                }
            } catch(e) {
                console.error(e);
                msgEl.innerText = "Connection error. Try again.";
                msgEl.style.color = "red";
            }
        }
    </script>
</body>
</html>
