<!DOCTYPE html>
<html lang="en">
<head>
    <title>Reset Password - BigFrench</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #fff5e6; }
        .box { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { background: #f25c05; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Set New Password</h2>
        <input type="password" id="newPass" placeholder="Enter New Password" required />
        <br>
        <button onclick="resetPassword()">Update Password</button>
        <p id="msg" style="color: green; margin-top: 10px;"></p>
    </div>

    <script>
        async function resetPassword() {
            const params = new URLSearchParams(window.location.search);
            const token = params.get('token'); 
            const password = document.getElementById('newPass').value; // 'password' bhejna hai

            if(!password || password.length < 6) return alert("Password too short");

            document.getElementById('msg').innerText = "Updating...";
            try {
                const res = await fetch(`/auth/reset-password/${token}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password }) // Key must match backend
                });
                const data = await res.json();
                document.getElementById('msg').innerText = data.message;
                if(res.ok) {
                    setTimeout(() => window.location.href = '/login.html', 2000);
                }
            } catch(e) { document.getElementById('msg').innerText = "Error!"; }
        }
    </script>
</body>
</html>
